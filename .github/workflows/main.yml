name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:  # 👈 Enables manual run

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://shoukatjjj:$HF_TOKEN@huggingface.co/spaces//shoukatjjj/text-summarizer main
